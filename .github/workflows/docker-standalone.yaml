---
name: Build Standalone Image

"on":
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Point this to your new standalone Dockerfile
          file: ./Dockerfile 
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ipmi-server-standalone:latest
            ghcr.io/${{ github.repository_owner }}/ipmi-server-standalone:${{ github.sha }}
